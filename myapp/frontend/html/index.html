<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MyApp Lab</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; max-width: 720px; }
      input, textarea, button { width: 100%; padding: 10px; margin: 8px 0; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      code { background:#f3f3f3; padding:2px 6px; border-radius:4px; }
      .card { border:1px solid #ddd; border-radius:8px; padding:16px; margin-top:16px; }
      .muted { color:#666; font-size:14px; }
    </style>
  </head>
  <body>
    <h1>MyApp Lab</h1>
    <p class="muted">Frontend estático (Nginx) → API → Redis → Worker</p>

    <div class="card">
      <h3>Enqueue Job</h3>
      <label>Email</label>
      <input id="email" placeholder="you@example.com" />
      <label>Payload</label>
      <textarea id="payload" rows="4" placeholder="anything..."></textarea>
      <button id="send">Send</button>
      <p id="out"></p>
      <p id="status"></p>
    </div>

    <script src="/config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
