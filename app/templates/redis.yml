apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Values.namespace }}
  name: redis
  labels:
    app.kubernetes.io/name: {{ .Values.app_name }}
    app.kubernetes.io/component: cache-redis
    app.kubernetes.io/part-of: {{ .Values.app_name }}
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.app_name }}
      app.kubernetes.io/component: cache-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.app_name }}
        app.kubernetes.io/component: cache-redis
        app.kubernetes.io/part-of: {{ .Values.app_name }}
        tier: backend
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis_image.name }}:{{ .Values.redis_image.tag }}"
          ports: 
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.namespace }}
  name: redis-service
spec:
  selector:
    app.kubernetes.io/name: {{ .Values.app_name }}
    app.kubernetes.io/component: cache-redis
    app.kubernetes.io/part-of: {{ .Values.app_name }}
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
    
