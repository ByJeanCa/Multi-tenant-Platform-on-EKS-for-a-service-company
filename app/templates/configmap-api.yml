apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.app_name }}-api-config"
  namespace: {{ .Values.namespace }}
data:
  DB_HOST: {{ .Values.db.host | quote }}
  DB_PORT: {{ .Values.db.port | quote }}
  DB_NAME: {{ .Values.db.name | quote }}
  DB_USER_FILE: {{ .Values.db.user_file | quote }}
  DB_PASSWORD_FILE: {{ .Values.db.password_file | quote }}

