apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
    name: "{{ .Values.app_name }}-net-policy-worker-egress"
    namespace: {{ .Values.namespace }}
spec:
    podSelector:
        matchLabels:
            app.kubernetes.io/component: worker
            app.kubernetes.io/name: {{ .Values.app_name }}
    policyTypes:
        - Egress
    egress:
        - to:
            - podSelector:
                matchLabels:
                    app.kubernetes.io/component: cache-redis
                    app.kubernetes.io/name: {{ .Values.app_name }}
          ports:
            - protocol: TCP
              port: 6379
        - to:
            - namespaceSelector:
                matchLabels:
                    kubernetes.io/metadata.name: kube-system
              podSelector:
                matchLabels:
                    k8s-app: kube-dns
          ports:
            - protocol: UDP
              port: 53
            - protocol: TCP
              port: 53



